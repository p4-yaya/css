<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Mikasi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="pagina de cadastro.css">

    <style>
     /*Importa o arquivo da fonte */
        @font-face {
            font-family: 'Bubbleboddy'; 
            src: url('fontes/bubbleboddyneue-regular.ttf') format('truetype'); 
            font-weight: normal;
            font-style: normal;
        }

    </style>
</head>

<body>

    <div class="card">

        <!-- LOGO -->
        <div class="logo">
            <img src="imagensconstrução/logo.png" alt="mikisa">
        </div>

        <!-- TÍTULO -->
        <h2>Criar Conta</h2>

        <p class="subtitle">
            Preencha os dados para se cadastrar
        </p>

        <!-- FORM -->
        <form>

            <input type="text" placeholder="Nome completo" class="input">

            <input type="email" placeholder="Email" class="input">

            <input type="password" placeholder="Senha" class="input">

            <input type="password" placeholder="Confirmar senha" class="input">

            <button class="btn">
                Criar conta
            </button>

        </form>

        <!-- LOGIN -->
        <div class="login-link">
            Já possui conta?
            <a href="#">Entrar</a>
        </div>

    </div>

</body>

</html>
